    <!-- オーバーレイ / Overlay -->
    <div id="overlay">
      <p><span class="far">&#xf254;</span>now loading...</p>
    </div>

    <!-- ヘッダ / Header -->
    <div id="header">
      <!-- 再生コントロール / Playback control -->
      <div id="control" class="far">
        <a href="#" id="play" class="disabled">&#xf144;</a>
        <a href="#" id="stop" class="disabled">&#xf28d;</a>
      </div>
      <!-- アーティストと楽曲の情報 / Artist and song info -->
      <div id="meta">
        <div id="artist">artist: <span>-</span></div>
        <div id="song">song: <span>-</span></div>
      </div>
    </div>

    <!-- 音源 / Audio souce -->
    <div id="media"></div>

    <!-- 歌詞 / Lyrics text -->
    <div id="lyrics">
      <!-- 文字 / Text -->
      <div id="text"></div>
      <!-- ビートバー / Beat bar -->
      <div id="bar"></div>
    </div>

    <!-- シークバー -->
    <div id="seekbar">
      <div></div>
    </div>

  <body>
    <div id="overlay"><button class="play" disabled>再生</button></div>
    <div id="container">
      <div>
        <p id="lyrics">
          <span id="text"></span>
        </p>
      </div>
    </div>
    <div id="media"></div>
    <div id="header">
      <div id="meta">
        <div id="artist"><strong>artist:</strong> <span>-</span></div>
        <div id="song"><strong>song:</strong> <span>-</span></div>
      </div>
      <ul>
        <li>発声中の歌詞テキストがあれば表示されます</li>
        <li>
          <a>TextAlive ホストの有無</a>により再生コントロールの表示状態が切り替わります
        </li>
      </ul>
    </div>
    <div id="footer">
      <p>
        <span id="position"><strong>-</strong> [ms]</span>
      </p>
      <div id="control" style="display: none">
        <button class="play" disabled>再生</button>
        <button id="jump" disabled>歌詞頭出し</button>
        <button id="pause" disabled>一時停止</button>
        <button id="rewind" disabled>巻き戻し</button>
      </div>
    </div>
    <script type="module" src="/index.js"></script>
  </body>
